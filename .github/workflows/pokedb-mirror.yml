name: Mirror PokeDB Open Data

on:
  schedule:
    # 毎日UTC 0:00に実行 (日本時間 9:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml
          
      - name: Download files
        run: |
          python3 << 'EOF'
          import requests
          from bs4 import BeautifulSoup
          import time
          import os
          from urllib.parse import urljoin
          import json
          from datetime import datetime, timezone, timedelta
          
          # 古いと判定するしきい値（日数）
          STABLE_THRESHOLD_DAYS = 14
          
          # 週に一度だけダウンロードする曜日 (0:月, 1:火, 2:水, 3:木, 4:金, 5:土, 6:日)
          WEEKLY_DOWNLOAD_WEEKDAY = 6  # 日曜日
          
          targets = [
              {"url": "https://champs.pokedb.tokyo/guide/opendata", "dir": "data/champs"}
          ]
          
          def should_skip_download(filepath, target_dir):
              filename = os.path.basename(filepath)
              name_without_ext, _ = os.path.splitext(filename)
              json_filepath = os.path.join(target_dir, f"{name_without_ext}.json")
              
              if not os.path.exists(json_filepath):
                  # ローカルにJSONファイルが存在しない場合は新規取得するためスキップしない
                  return False
                  
              try:
                  with open(json_filepath, 'r', encoding='utf-8') as f:
                      data = json.load(f)
                      
                  updated_at_str = data.get('updated_at')
                  if not updated_at_str:
                      return False
                      
                  # updated_at: "YYYY-MM-DD HH:MM:SS" (JST)
                  updated_at = datetime.strptime(updated_at_str, "%Y-%m-%d %H:%M:%S")
                  
                  # 現在の日本時間 (JST) を取得
                  # Github Actions環境（通常UTC）に対応するためタイムゾーン調整を行う
                  jst_timezone = timezone(timedelta(hours=9))
                  now_jst = datetime.now(timezone.utc).astimezone(jst_timezone)
                  
                  # タイムゾーン情報なしのdatetimeに揃えて差分計算
                  now_naive = now_jst.replace(tzinfo=None)
                  diff = now_naive - updated_at
                  
                  if diff.days > STABLE_THRESHOLD_DAYS:
                      # 最終更新から一定日数経過している場合、指定曜日以外はダウンロードをスキップ
                      if now_jst.weekday() != WEEKLY_DOWNLOAD_WEEKDAY:
                          weekdays_ja = ["月", "火", "水", "木", "金", "土", "日"]
                          print(f"Skipping {filename}: last updated {diff.days} days ago (threshold: {STABLE_THRESHOLD_DAYS} days), today is {weekdays_ja[now_jst.weekday()]} (weekly update on {weekdays_ja[WEEKLY_DOWNLOAD_WEEKDAY]})")
                          return True
                          
              except Exception as e:
                  print(f"Error checking update status for {filename}: {e}")
                  
              return False
          
          for target in targets:
              base_url = target["url"]
              target_dir = target["dir"]
              print(f"\n=== Processing: {base_url} -> {target_dir} ===")
              
              try:
                  response = requests.get(base_url, timeout=30)
                  response.raise_for_status()
                  soup = BeautifulSoup(response.content, 'html.parser')
              except Exception as e:
                  print(f"Error fetching base URL {base_url}: {e}")
                  continue
              
              # ディレクトリを作成
              os.makedirs(target_dir, exist_ok=True)
              
              # CSV と JSON ファイルのリンクを探す
              links = []
              for link in soup.find_all('a', href=True):
                  href = link['href']
                  if '/opendata/' in href and (href.endswith('.csv') or href.endswith('.json')):
                      links.append(href)
              
              downloaded_files = []
              
              for idx, href in enumerate(links):
                  file_url = urljoin(base_url, href)
                  filename = os.path.basename(href)
                  filepath = os.path.join(target_dir, filename)
                  
                  if should_skip_download(filepath, target_dir):
                      continue
                      
                  print(f"Downloading: {file_url}")
                  
                  try:
                      file_response = requests.get(file_url, timeout=30)
                      file_response.raise_for_status()
                      
                      with open(filepath, 'wb') as f:
                          f.write(file_response.content)
                      
                      print(f"Saved: {filepath}")
                      downloaded_files.append(filename)
                      
                      # 5秒待機
                      if idx < len(links) - 1:
                          print("Waiting 5 seconds...")
                          time.sleep(5)
                          
                  except Exception as e:
                      print(f"Error downloading {file_url}: {e}")
              
              print(f"Total files downloaded for {target_dir}: {len(downloaded_files)}")
              for f in downloaded_files:
                  print(f"  - {f}")
          EOF
          
      - name: Check for changes
        id: check_changes
        run: |
          git add data/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          
      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Update PokeDB data - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
          
      - name: No changes detected
        if: steps.check_changes.outputs.changed == 'false'
        run: |
          echo "No changes detected in data files."